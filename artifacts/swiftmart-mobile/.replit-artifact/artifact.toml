kind = "mobile"
previewPath = "/swiftmart-mobile/"
title = "SwiftMart Mobile"
version = "1.0.0"
id = "artifacts/swiftmart-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/swiftmart-mobile/" ]
localPort = 25262

[services.development]
run = "pnpm --filter @workspace/swiftmart-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/swiftmart-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/swiftmart-mobile", "run", "serve" ]

[services.env]
PORT = "25262"
BASE_PATH = "/swiftmart-mobile/"
